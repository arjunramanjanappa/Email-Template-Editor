spring.application.name=Email Template Editor
server.port=8080

# ─── H2 File Database (persists between restarts) ────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/email_templates;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── H2 Web Console (open http://localhost:8080/h2-console for debug) ────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Multipart (for future HTML file import) ─────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.arjun=INFO
logging.level.org.hibernate.SQL=WARN
